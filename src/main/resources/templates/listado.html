<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Listado de Materias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Materias</h2>
<a th:href="@{/materias/nueva}" class="btn btn-primary mb-3">Nueva Materia</a>

<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Créditos</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="materia : ${materias}">
        <td th:text="${materia.id}"></td>
        <td th:text="${materia.nombre}"></td>
        <td th:text="${materia.creditos}"></td>
        <td>
            <a th:href="@{/materias/editar/{id}(id=${materia.id})}" class="btn btn-warning btn-sm">Editar</a>
            <a th:href="@{/materias/eliminar/{id}(id=${materia.id})}" class="btn btn-danger btn-sm">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
