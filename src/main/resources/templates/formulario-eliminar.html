<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Confirmar Eliminación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="alert alert-danger">
    <h2>¿Estás seguro de que deseas eliminar esta materia?</h2>
    <p><strong>Materia:</strong> <span th:text="${materia.nombre}"></span></p>
    <p><strong>Créditos:</strong> <span th:text="${materia.creditos}"></span></p>

    <form th:action="@{/materias/borrar/{id}(id=${materia.id})}" method="post" class="mt-3">
        <button type="submit" class="btn btn-danger">Confirmar Eliminación</button>
        <a th:href="@{/materias}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
